<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legal AI Agent Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              panel: "#111827",
              panelSoft: "#1f2937",
              stroke: "#334155",
            },
            keyframes: {
              pulseSoft: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.45" },
                "50%": { transform: "scale(1.16)", opacity: "1" },
              },
            },
            animation: {
              pulseSoft: "pulseSoft 1s ease-in-out infinite",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background: radial-gradient(circle at top, #111827 0%, #020617 55%, #020617 100%);
      }
    </style>
  </head>
  <body class="text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="module">
      import React, { useMemo, useState } from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
      import htm from "https://esm.sh/htm@3.1.1";
      import {
        BrainCircuit,
        Database,
        FileSearch,
        Files,
        PauseCircle,
        PlayCircle,
        Search,
        ShieldCheck,
        Sparkles,
      } from "https://esm.sh/lucide-react@0.469.0";

      const html = htm.bind(React.createElement);

      const NAV_ITEMS = [
        { id: "knowledge", label: "Knowledge", icon: Files },
        { id: "rag", label: "RAG Engine", icon: Search },
        { id: "workflow", label: "Contract Review", icon: BrainCircuit },
        { id: "audit", label: "Audit Log", icon: FileSearch },
      ];

      const RAW_LEGAL_TEXT =
        "PRC Civil Code Chapter III Article 125 Item 2: Where parties sign through electronic means, the validity of consent and retention obligations shall follow secure traceability standards.";

      const TAGGED_TEXT = [
        "[Chapter] PRC Civil Code Chapter III",
        "[Article] Article 125",
        "[Item] Item 2",
        "Where parties sign through electronic means, the validity of consent and retention obligations shall follow secure traceability standards.",
      ];

      function PillNode({ label, active }) {
        return html`<div
          className=${`h-20 w-20 rounded-full border flex items-center justify-center text-sm font-semibold transition-all duration-300 ${
            active
              ? "bg-blue-500/30 border-blue-300 text-blue-100 shadow-[0_0_26px_rgba(59,130,246,0.5)] animate-pulseSoft"
              : "bg-slate-700/40 border-slate-500 text-slate-300"
          }`}
        >
          ${label}
        </div>`;
      }

      function App() {
        const [activeNav, setActiveNav] = useState("knowledge");
        const [parsing, setParsing] = useState(false);
        const [parseStep, setParseStep] = useState(0);
        const [query, setQuery] = useState("termination compensation in SaaS contract");
        const [ragPhase, setRagPhase] = useState("idle");
        const [flowStep, setFlowStep] = useState(0);
        const [flowRunning, setFlowRunning] = useState(false);
        const [interrupted, setInterrupted] = useState(false);
        const [approved, setApproved] = useState(false);
        const [showCitation, setShowCitation] = useState(false);

        const flowNodes = useMemo(
          () => [
            "Ingest Contract",
            "Clause Extraction",
            "Risk Scoring",
            "Human Approval",
            "Generate Report",
          ],
          []
        );

        const runKnowledgeDemo = () => {
          if (parsing) return;
          setParsing(true);
          setParseStep(0);
          setTimeout(() => setParseStep(1), 500);
          setTimeout(() => setParseStep(2), 1100);
          setTimeout(() => setParseStep(3), 1700);
          setTimeout(() => setParseStep(4), 2400);
          setTimeout(() => setParsing(false), 2600);
        };

        const runRagDemo = () => {
          if (!query.trim()) return;
          setRagPhase("pulse");
          setTimeout(() => setRagPhase("merge"), 1700);
          setTimeout(() => setRagPhase("done"), 2600);
        };

        const runWorkflow = () => {
          if (flowRunning) return;
          setFlowRunning(true);
          setInterrupted(false);
          setApproved(false);
          setFlowStep(0);
          setTimeout(() => setFlowStep(1), 600);
          setTimeout(() => setFlowStep(2), 1200);
          setTimeout(() => {
            setFlowStep(3);
            setFlowRunning(false);
            setInterrupted(true);
          }, 2000);
        };

        const approveFlow = () => {
          setInterrupted(false);
          setApproved(true);
          setFlowRunning(true);
          setTimeout(() => setFlowStep(4), 700);
          setTimeout(() => {
            setFlowStep(5);
            setFlowRunning(false);
          }, 1400);
        };

        return html`<main className="flex min-h-screen">
          <aside className="w-64 border-r border-slate-700/60 bg-panel/80 backdrop-blur px-4 py-6">
            <div className="mb-8">
              <h1 className="text-lg font-semibold tracking-wide">Legal AI Agent</h1>
              <p className="text-xs text-slate-400 mt-1">Enterprise Demo Console</p>
            </div>
            <nav className="space-y-2">
              ${NAV_ITEMS.map(
                ({ id, label, icon: Icon }) => html`<button
                  key=${id}
                  onClick=${() => setActiveNav(id)}
                  className=${`w-full rounded-lg px-3 py-2 text-left text-sm flex items-center gap-3 border transition ${
                    activeNav === id
                      ? "bg-blue-500/15 border-blue-500/50 text-blue-100"
                      : "bg-slate-800/35 border-transparent text-slate-300 hover:bg-slate-700/50"
                  }`}
                >
                  <${Icon} size=${16} />
                  <span>${label}</span>
                </button>`
              )}
            </nav>
          </aside>

          <section className="flex-1 p-8">
            <div className="max-w-6xl mx-auto space-y-6">
              <header className="rounded-xl border border-slate-700 bg-panelSoft/40 px-5 py-4 flex items-center justify-between">
                <div>
                  <p className="text-slate-300 text-sm">Interactive Feature Showcase</p>
                  <p className="text-xl font-semibold mt-1">Autonomous Contract Intelligence</p>
                </div>
                <div className="text-xs text-slate-400 flex items-center gap-2">
                  <Sparkles size=${14} /> UI-only demo, powered by "setTimeout"
                </div>
              </header>

              <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                <article className="rounded-xl border border-slate-700 bg-panel/70 p-5 space-y-4">
                  <div className="flex items-center justify-between">
                    <h2 className="font-semibold text-base">Knowledge Parsing Demo</h2>
                    <button
                      onClick=${runKnowledgeDemo}
                      className="px-3 py-1.5 rounded-md bg-blue-600 hover:bg-blue-500 text-sm"
                    >
                      ${parsing ? "Parsing..." : "Parse Regulations"}
                    </button>
                  </div>
                  <p className="text-sm text-slate-300 leading-relaxed">${RAW_LEGAL_TEXT}</p>
                  <div className="rounded-lg border border-slate-700 bg-slate-900/60 p-3 min-h-28">
                    <p className="text-xs uppercase text-slate-400 mb-2">Structured Output</p>
                    <div className="space-y-1 text-sm">
                      ${TAGGED_TEXT.slice(0, parseStep).map(
                        (line, i) => html`<p
                          key=${line}
                          className="animate-pulse text-emerald-300 transition duration-300"
                          style=${{ animationDelay: `${i * 120}ms` }}
                        >
                          ${line}
                        </p>`
                      )}
                      ${parseStep === 0 &&
                      html`<p className="text-slate-500">Click the button to start simulated tagging...</p>`}
                    </div>
                  </div>
                </article>

                <article className="rounded-xl border border-slate-700 bg-panel/70 p-5 space-y-4">
                  <h2 className="font-semibold text-base">RAG Retrieval Demo</h2>
                  <div className="flex gap-2">
                    <input
                      value=${query}
                      onChange=${(e) => setQuery(e.target.value)}
                      placeholder="Search legal knowledge..."
                      className="flex-1 rounded-md bg-slate-900/80 border border-slate-700 px-3 py-2 text-sm outline-none focus:border-blue-500"
                    />
                    <button onClick=${runRagDemo} className="px-3 py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 text-sm">
                      Search
                    </button>
                  </div>

                  <div className="rounded-lg border border-slate-700 bg-slate-900/50 p-4 min-h-44 flex flex-col justify-center">
                    ${(ragPhase === "idle" || ragPhase === "done") &&
                    html`<p className="text-sm text-slate-400 mb-3">Federated retrieval engines:</p>`}

                    ${ragPhase === "pulse" &&
                    html`<div className="flex items-center justify-center gap-8 py-6">
                      <${PillNode} label="ES" active=${true} />
                      <${PillNode} label="Milvus" active=${true} />
                      <${PillNode} label="Neo4j" active=${true} />
                    </div>`}

                    ${ragPhase === "merge" &&
                    html`<div className="text-center text-blue-300 animate-pulse py-8">Aggregating ranked chunks...</div>`}

                    ${ragPhase === "done" &&
                    html`<ul className="space-y-2 text-sm">
                      <li className="rounded border border-slate-700 px-3 py-2 bg-slate-800/40">1. Civil Code Article 580 - Contract rescission grounds.</li>
                      <li className="rounded border border-slate-700 px-3 py-2 bg-slate-800/40">2. E-Commerce Law Article 49 - Digital signature validity.</li>
                      <li className="rounded border border-slate-700 px-3 py-2 bg-slate-800/40">3. SPC Judicial Interpretation - Damages quantification factors.</li>
                    </ul>`}

                    ${ragPhase === "idle" &&
                    html`<div className="text-sm text-slate-500">Trigger search to visualize multi-engine retrieval.</div>`}
                  </div>
                </article>

                <article className="rounded-xl border border-slate-700 bg-panel/70 p-5 space-y-4">
                  <div className="flex items-center justify-between">
                    <h2 className="font-semibold text-base">LangGraph Workflow Demo</h2>
                    <div className="flex gap-2">
                      <button
                        onClick=${runWorkflow}
                        className="px-3 py-1.5 rounded-md bg-blue-600 hover:bg-blue-500 text-sm flex items-center gap-1"
                      >
                        <${PlayCircle} size=${14} /> Run
                      </button>
                      <button
                        onClick=${() => {
                          setFlowRunning(false);
                          setInterrupted(true);
                        }}
                        className="px-3 py-1.5 rounded-md bg-rose-600 hover:bg-rose-500 text-sm flex items-center gap-1"
                      >
                        <${PauseCircle} size=${14} /> Interrupt
                      </button>
                    </div>
                  </div>

                  <svg viewBox="0 0 560 160" className="w-full rounded-lg bg-slate-900/40 border border-slate-700 p-3">
                    ${flowNodes.map((node, i) => {
                      const x = 40 + i * 104;
                      const done = flowStep > i;
                      const active = flowStep === i;
                      const color = done || active ? "#3b82f6" : "#475569";
                      return html`<g key=${node}>
                        ${i < flowNodes.length - 1 &&
                        html`<line x1=${x + 90} y1="70" x2=${x + 104} y2="70" stroke=${flowStep > i ? "#3b82f6" : "#334155"} stroke-width="2" />`}
                        <rect x=${x} y="45" width="90" height="50" rx="8" fill=${color} opacity=${active ? "0.95" : done ? "0.8" : "0.45"} />
                        <text x=${x + 45} y="74" text-anchor="middle" fill="#e2e8f0" font-size="10">${node}</text>
                      </g>`;
                    })}
                  </svg>

                  ${interrupted &&
                  html`<div className="rounded-md border border-red-500/50 bg-red-950/40 text-red-300 px-3 py-2 text-sm">
                    Awaiting Human Approval
                    <button onClick=${approveFlow} className="ml-3 px-2 py-1 rounded bg-emerald-600 hover:bg-emerald-500 text-white">
                      Approve
                    </button>
                  </div>`}

                  ${approved &&
                  flowStep >= 5 &&
                  html`<div className="rounded-md border border-emerald-500/50 bg-emerald-950/40 text-emerald-300 px-3 py-2 text-sm">
                    Workflow completed with human approval.
                  </div>`}
                </article>

                <article className="rounded-xl border border-slate-700 bg-panel/70 p-5 space-y-4">
                  <h2 className="font-semibold text-base">Citation Verification Demo</h2>
                  <p className="text-sm text-slate-300 leading-7">
                    Based on
                    <span
                      className="relative mx-1 text-blue-400 underline decoration-blue-500 cursor-pointer"
                      onMouseEnter=${() => setShowCitation(true)}
                      onMouseLeave=${() => setShowCitation(false)}
                    >
                      Civil Code Article 533
                      ${showCitation &&
                      html`<span className="absolute left-1/2 -translate-x-1/2 -top-9 whitespace-nowrap rounded-md border border-emerald-500/60 bg-emerald-900/90 px-2 py-1 text-xs text-emerald-200 shadow-lg">
                        <span className="inline-flex items-center gap-1"><${ShieldCheck} size=${12} /> Source Verified</span>
                      </span>`}
                    </span>
                    and related judicial interpretation, the liability cap clause is likely enforceable but requires explicit disclosure language.
                  </p>
                  <div className="text-xs text-slate-500">Hover the legal citation to trigger validation badge.</div>
                </article>
              </div>

              <footer className="text-xs text-slate-500 pt-2 flex items-center gap-2">
                <${Database} size=${13} /> Demo environment only - no backend calls.
              </footer>
            </div>
          </section>
        </main>`;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
